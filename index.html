<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aydin's Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 20px 16px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: #ff6b8a; }
    header p {
      margin-top: 4px;
      font-size: 0.82rem;
      color: #666;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Section labels ── */
    .section-label {
      padding: 20px 16px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #555;
    }
    .section-label.new { color: #ff6b8a; }

    /* ── Grid (shared for both new and older) ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 0 4px 4px;
    }
    @media (min-width: 600px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    .grid-card {
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
      border-radius: 6px;
    }
    .grid-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s ease;
    }
    .grid-card:active img { transform: scale(0.95); }
    .grid-card.is-new {
      outline: 2px solid #ff6b8a;
      outline-offset: -2px;
    }

    /* ── NEW badge ── */
    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff6b8a;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #444;
    }
    .empty p { font-size: 1rem; margin-top: 12px; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: 100vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 6px;
      user-select: none;
      -webkit-user-drag: none;
    }

    #lb-close {
      position: absolute;
      top: 16px; right: 20px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      background: none;
      border: none;
      padding: 8px;
    }
    #lb-close:hover { opacity: 1; }

    #lb-date {
      position: absolute;
      bottom: 28px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    #lb-prev, #lb-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; background: rgba(255,255,255,0.2); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 0.75rem;
      color: #333;
    }
  </style>
</head>
<body>

<header>
  <h1>Aydin <span>♥</span></h1>
  <p id="subtitle">Loading photos...</p>
</header>

<main id="main"></main>

<footer id="footer"></footer>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">&#x2715;</button>
  <button id="lb-prev">&#x2039;</button>
  <img id="lb-img" src="" alt="Aydin" />
  <button id="lb-next">&#x203a;</button>
  <div id="lb-date"></div>
</div>

<script>
  const ONE_DAY = 86400000;
  const NOW = Date.now();

  let allPhotos = [];
  let lbIndex = 0;

  function formatDate(isoStr) {
    const d = new Date(isoStr);
    return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  }

  function isNew(isoStr) {
    return (NOW - new Date(isoStr).getTime()) < 7 * ONE_DAY;
  }

  function openLightbox(index) {
    lbIndex = index;
    renderLightbox();
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.body.style.overflow = "";
  }

  function renderLightbox() {
    const photo = allPhotos[lbIndex];
    document.getElementById("lb-img").src = photo.path;
    document.getElementById("lb-date").textContent = formatDate(photo.date);
  }

  function prevPhoto() {
    lbIndex = (lbIndex - 1 + allPhotos.length) % allPhotos.length;
    renderLightbox();
  }

  function nextPhoto() {
    lbIndex = (lbIndex + 1) % allPhotos.length;
    renderLightbox();
  }

  // Swipe support
  let touchStartX = 0;
  document.getElementById("lightbox").addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById("lightbox").addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
  }, { passive: true });

  document.getElementById("lb-close").addEventListener("click", closeLightbox);
  document.getElementById("lb-prev").addEventListener("click", prevPhoto);
  document.getElementById("lb-next").addEventListener("click", nextPhoto);
  document.getElementById("lightbox").addEventListener("click", e => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  });

  document.addEventListener("keydown", e => {
    if (!document.getElementById("lightbox").classList.contains("open")) return;
    if (e.key === "ArrowLeft") prevPhoto();
    if (e.key === "ArrowRight") nextPhoto();
    if (e.key === "Escape") closeLightbox();
  });

  function buildCard(photo, index) {
    const div = document.createElement("div");
    div.className = "grid-card";
    if (isNew(photo.date)) div.classList.add("is-new");
    div.addEventListener("click", () => openLightbox(index));

    const img = document.createElement("img");
    img.src = photo.path;
    img.alt = "Aydin";
    img.loading = "lazy";
    div.appendChild(img);

    if (isNew(photo.date)) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = "NEW";
      div.appendChild(badge);
    }

    return div;
  }

  async function load() {
    try {
      const res = await fetch("photos.json?" + NOW);
      allPhotos = await res.json();

      if (allPhotos.length === 0) {
        document.getElementById("subtitle").textContent = "No photos yet";
        document.getElementById("main").innerHTML =
          '<div class="empty"><p>Photos will appear here once fetched.</p></div>';
        return;
      }

      const newPhotos = allPhotos.filter(p => isNew(p.date));
      const olderPhotos = allPhotos.filter(p => !isNew(p.date));

      document.getElementById("subtitle").textContent =
        `${allPhotos.length} photo${allPhotos.length !== 1 ? "s" : ""}`;

      const main = document.getElementById("main");
      main.innerHTML = "";

      // This Week section
      if (newPhotos.length > 0) {
        const label = document.createElement("div");
        label.className = "section-label new";
        label.textContent = "This Week";
        main.appendChild(label);

        const grid = document.createElement("div");
        grid.className = "grid";
        newPhotos.forEach(p => grid.appendChild(buildCard(p, allPhotos.indexOf(p))));
        main.appendChild(grid);
      }

      // Older photos
      if (olderPhotos.length > 0) {
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = "Earlier";
        main.appendChild(label);

        const grid = document.createElement("div");
        grid.className = "grid";
        olderPhotos.forEach(p => grid.appendChild(buildCard(p, allPhotos.indexOf(p))));
        main.appendChild(grid);
      }

      document.getElementById("footer").textContent =
        `Last updated ${new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}`;

    } catch (err) {
      document.getElementById("subtitle").textContent = "Could not load photos";
      console.error(err);
    }
  }

  load();
</script>
</body>
</html>
